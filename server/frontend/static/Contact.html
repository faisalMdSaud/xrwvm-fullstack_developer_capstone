<head>

    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <link rel="stylesheet" href="/static/contactus.css">
</head>
<div>
  <nav class="navbar navbar-expand-lg navbar-light" style="background-color:darkturquoise; height: 1in;">
    <div class="container-fluid">
      <h2 style="padding-right: 5%;">Dealerships</h2>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarText">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" style="font-size: larger;" aria-current="page" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" style="font-size: larger;" href="/about">About Us</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" style="font-size: larger;" href="/contact">Contact Us</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  
    <section class="contact-section">

    <div class="contact-container">

        <div class="contact-info">

            <h4>GET IN TOUCH</h4>

            <h1>Contact Us</h1>

            <p>
                We'd love to hear from you. Whether you have a question,
                feedback, or a project in mind, feel free to reach out.
            </p>

            <div class="info-box">
                <span>📍</span>
                <div>
                    <h3>Address</h3>
                    <p>Dhaka, Bangladesh</p>
                </div>
            </div>

            <div class="info-box">
                <span>📞</span>
                <div>
                    <h3>Phone</h3>
                    <p>+880 1234 567890</p>
                </div>
            </div>

            <div class="info-box">
                <span>✉️</span>
                <div>
                    <h3>Email</h3>
                    <p>contact@example.com</p>
                </div>
            </div>

        </div>


        <div class="contact-form">

            <form>

                <div class="row">
                    <input type="text" placeholder="First Name" required>
                    <input type="text" placeholder="Last Name" required>
                </div>

                <input type="email" placeholder="Email Address" required>

                <input type="text" placeholder="Subject">

                <textarea rows="6" placeholder="Write your message..."></textarea>

                <button type="submit">Send Message</button>

            </form>

        </div>

    </div>

</section>
    
    
</div>

</html>
